<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>

    <radialGradient id="glowViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 70) rotate(90) scale(260 380)">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1380 360) rotate(90) scale(230 340)">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="traceGrad" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#C7D2FE"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1600" height="420" fill="url(#bgGrad)"/>
  <rect width="1600" height="420" fill="url(#glowViolet)"/>
  <rect width="1600" height="420" fill="url(#glowCyan)"/>

  <!-- outer hairline frame -->
  <rect x="1" y="1" width="1598" height="418" rx="18" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- faint background circuit traces -->
  <g stroke="rgba(255,255,255,0.07)" stroke-width="1.4" fill="none">
    <path d="M -20 66 H 210 V 108 H 470 V 50 H 760 V 96 H 1060 V 40 H 1340 V 84 H 1660"/>
    <path d="M -20 356 H 260 V 314 H 540 V 372 H 840 V 328 H 1150 V 380 H 1420 V 336 H 1660"/>
  </g>

  <!-- faint nodes on background traces -->
  <g fill="#1E293B" stroke="rgba(255,255,255,0.14)" stroke-width="1.2">
    <circle cx="210" cy="66" r="3.5"/><circle cx="470" cy="108" r="3.5"/><circle cx="760" cy="50" r="3.5"/>
    <circle cx="1060" cy="96" r="3.5"/><circle cx="1340" cy="40" r="3.5"/>
    <circle cx="260" cy="356" r="3.5"/><circle cx="540" cy="314" r="3.5"/><circle cx="840" cy="372" r="3.5"/>
    <circle cx="1150" cy="328" r="3.5"/><circle cx="1420" cy="380" r="3.5"/>
  </g>

  <!-- active animated data-flow trace (top) -->
  <path d="M -20 66 H 210 V 108 H 470 V 50 H 760 V 96 H 1060 V 40 H 1340 V 84 H 1660"
        stroke="url(#traceGrad)" stroke-width="1.6" fill="none" opacity="0.85"
        stroke-dasharray="10 14">
    <animate attributeName="stroke-dashoffset" from="0" to="-240" dur="6s" repeatCount="indefinite"/>
  </path>

  <!-- active animated data-flow trace (bottom, offset timing) -->
  <path d="M -20 356 H 260 V 314 H 540 V 372 H 840 V 328 H 1150 V 380 H 1420 V 336 H 1660"
        stroke="url(#traceGrad)" stroke-width="1.6" fill="none" opacity="0.7"
        stroke-dasharray="8 16">
    <animate attributeName="stroke-dashoffset" from="0" to="240" dur="7.5s" repeatCount="indefinite"/>
  </path>

  <!-- pulsing signal nodes -->
  <g>
    <circle cx="760" cy="50" r="4" fill="#06B6D4">
      <animate attributeName="r" values="3.2;6;3.2" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1340" cy="40" r="4" fill="#8B5CF6">
      <animate attributeName="r" values="3.2;6;3.2" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="314" r="4" fill="#2563EB">
      <animate attributeName="r" values="3.2;6;3.2" dur="2.8s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="328" r="4" fill="#06B6D4">
      <animate attributeName="r" values="3.2;6;3.2" dur="2.6s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- kicker -->
  <text x="800" y="150" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" letter-spacing="6" fill="#06B6D4">BUILDING&#160;SYSTEMS,&#160;NOT&#160;SHORTCUTS</text>

  <!-- name -->
  <text x="800" y="228" text-anchor="middle" font-family="'IBM Plex Sans', 'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="76" font-weight="700" fill="url(#nameGrad)" letter-spacing="1">ZAKARIA BAHTANI</text>

  <!-- tagline -->
  <text x="800" y="270" text-anchor="middle" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="21" font-weight="500" fill="#CBD5E1" letter-spacing="0.5">Developer&#160;&#8226;&#160;Automation&#160;Engineer&#160;&#8226;&#160;Digital&#160;Growth&#160;Strategist</text>

  <!-- mission line -->
  <text x="800" y="304" text-anchor="middle" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="14.5" fill="#64748B">Automating business growth with software, AI and data &#8212; end to end.</text>

  <!-- thin separators either side of kicker -->
  <line x1="560" y1="145" x2="640" y2="145" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="960" y1="145" x2="1040" y2="145" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
</svg>
